site_name: JujuMate
site_description: Terminal UI for Juju infrastructure orchestration
site_url: https://abuelodelanada.github.io/jujumate
repo_url: https://github.com/Abuelodelanada/jujumate
repo_name: Abuelodelanada/jujumate

docs_dir: guide

hooks:
  - docs_hooks.py

theme:
  name: material
  logo: assets/icon.svg
  favicon: assets/icon.svg
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - search.highlight

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      base_path: [.]

nav:
  - Installation: installation.md
  - Usage: usage.md
  - Configuration: configuration.md
  - Themes: themes.md
  - Changelog: changelog.md

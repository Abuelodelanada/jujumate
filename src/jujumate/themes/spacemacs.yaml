# Spacemacs dark theme for JujuMate
# Based on the Spacemacs color theme by Nasser Alshammari
# Source: https://github.com/nashamri/spacemacs-theme

name: spacemacs

# ── Primary palette ───────────────────────────────────────────────────────────
primary:   "#4f97d7"      # Spacemacs blue     — main interactive accent (head1/keyword)
secondary: "#bc6ec5"      # Spacemacs purple   — secondary (func/comp)
accent:    "#4f97d7"      # Spacemacs blue     — borders, focus indicators

# ── Backgrounds ───────────────────────────────────────────────────────────────
foreground: "#b2b2b2"     # Spacemacs base text
background: "#292b2e"     # bg1 — main background
surface:    "#34323e"     # ttip-bg — modals, panels (slightly lighter)
panel:      "#2f2b33"     # cblk-bg — between background and surface

# ── Status colors ─────────────────────────────────────────────────────────────
success: "#86dc2f"        # suc  — active / healthy (bright lime green)
warning: "#dc752f"        # war  — waiting / maintenance (warm orange)
error:   "#e0211d"        # err  — error / blocked (red)

dark: true

variables:
  link:    "#2aa1ae"      # comment/cyan — URLs, IPs, consume access
  muted:   "#686868"      # base-dim     — unknown / inactive / read-only
  pulse-off: "#294a10"    # Dark Spacemacs green for pulse dim state
  focus-border: "#bc6ec5" # Spacemacs purple — focus indicator
  log-trace:   "#686868"  # base-dim muted
  log-debug:   "#2aa1ae"  # cyan
  log-info:    "#67b11d"  # green

  block-cursor-background:         "#444155"
  block-cursor-blurred-background: "#444155"
  block-cursor-foreground:         "#b2b2b2"
  block-cursor-blurred-foreground: "#b2b2b2"
  block-cursor-text-style:         "bold"
  block-cursor-blurred-text-style: "none"

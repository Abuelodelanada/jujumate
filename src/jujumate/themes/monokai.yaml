# Monokai theme for JujuMate
# Based on the original Monokai color scheme by Wimer Hazenberg
# Port reference: https://github.com/oneKelvinSmith/monokai-emacs

name: monokai

# ── Primary palette ───────────────────────────────────────────────────────────
primary:   "#AE81FF"      # Monokai violet  — main interactive accent
secondary: "#FD971F"      # Monokai orange  — secondary accent
accent:    "#66D9EF"      # Monokai cyan    — borders, focus indicators

# ── Backgrounds ───────────────────────────────────────────────────────────────
foreground: "#F8F8F2"     # Monokai foreground
background: "#272822"     # Monokai signature dark olive background
surface:    "#3E3D31"     # monokai-highlight-alt  — modals, panels
panel:      "#3C3D37"     # monokai-highlight-line — between background and surface

# ── Status colors ─────────────────────────────────────────────────────────────
success: "#A6E22E"        # Monokai green   — active / healthy
warning: "#E6DB74"        # Monokai yellow  — waiting / maintenance
error:   "#F92672"        # Monokai red     — error / blocked

dark: true

variables:
  link:    "#66D9EF"      # Monokai cyan    — URLs, IPs, consume access
  muted:   "#75715E"      # Monokai comments color — dim / unknown
  pulse-off: "#233E1E"    # monokai-diff-green-base — dark green for pulse dim state
  log-trace:   "#75715E"  # comment muted
  log-debug:   "#66D9EF"  # cyan
  log-info:    "#A6E22E"  # green

  block-cursor-background:         "#49483E"
  block-cursor-blurred-background: "#49483E"
  block-cursor-foreground:         "#F8F8F2"
  block-cursor-blurred-foreground: "#F8F8F2"
  block-cursor-text-style:         "bold"
  block-cursor-blurred-text-style: "none"

# Solarized Dark theme for JujuMate
# Based on the Solarized color scheme by Ethan Schoonover
# Port reference: https://github.com/bbatsov/solarized-emacs

name: solarized-dark

# ── Primary palette ───────────────────────────────────────────────────────────
primary:   "#268bd2"      # blue    — THE characteristic Solarized color
secondary: "#2aa198"      # cyan    — secondary accent
accent:    "#268bd2"      # blue    — borders, focus indicators

# ── Backgrounds (base03 → blue-1bg → base02 hierarchy) ───────────────────────
foreground: "#839496"     # base0   — primary body text
background: "#002b36"     # base03  — darkest background
surface:    "#073642"     # base02  — modals, elevated panels
panel:      "#003547"     # blue-1bg — between background and surface

# ── Status colors ─────────────────────────────────────────────────────────────
success: "#859900"        # green   — active / healthy
warning: "#b58900"        # yellow  — waiting / maintenance
error:   "#dc322f"        # red     — error / blocked

dark: true

variables:
  link:    "#268bd2"      # blue    — URLs, IPs, consume access
  muted:   "#586e75"      # base01  — comments / secondary content / unknown
  pulse-off: "#5b7300"    # green-d — dark green for pulse dim state
  log-trace:   "#586e75"  # base01 muted
  log-debug:   "#268bd2"  # blue
  log-info:    "#859900"  # green

  block-cursor-background:         "#073642"
  block-cursor-blurred-background: "#073642"
  block-cursor-foreground:         "#839496"
  block-cursor-blurred-foreground: "#839496"
  block-cursor-text-style:         "bold"
  block-cursor-blurred-text-style: "none"

# Default dark theme for JujuMate
name: dark
primary: "#004080"
secondary: "#0066CC"
accent: "#0099FF"
background: "#1a1a1a"
surface: "#2a2a2a"
panel: "#333333"
warning: "#EFB73E"
error: "#FF5555"
success: "#26A269"
dark: true
variables:
  link: "#19B6EE"
  muted: "#888888"
  pulse-off: "#004d26"
  blocked: "#FF8800"
  focus-border: "#19B6EE"   # cyan (link color) — focus indicator
  log-trace:   "#888888"   # same as muted
  log-debug:   "#19B6EE"   # cyan
  log-info:    "#26A269"   # green (same as success)
  block-cursor-background: "#2D4A6D"
  block-cursor-blurred-background: "#2D4A6D"
  block-cursor-foreground: "#FFFFFF"
  block-cursor-blurred-foreground: "#FFFFFF"
  block-cursor-text-style: "bold"
  block-cursor-blurred-text-style: "none"
